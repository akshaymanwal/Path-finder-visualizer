<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinding System - Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f2027;
    overflow: hidden;
}

/* GRID BACKGROUND */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background:
        linear-gradient(#00c6ff22 1px, transparent 1px),
        linear-gradient(90deg, #00c6ff22 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveGrid 15s linear infinite;
}

@keyframes moveGrid {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* LOGIN BOX */
.login-container {
    position: relative;
    z-index: 1;
    width: 360px;
    padding: 35px;
    border-radius: 15px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(0, 198, 255, 0.3);
    box-shadow: 0 0 25px rgba(0,198,255,0.2);
    text-align: center;
    color: white;
}

/* TITLE */
h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #00c6ff;
    text-shadow: 0 0 10px #00c6ff;
}

.greeting {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 25px;
}

/* INPUT */
.input-group {
    position: relative;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(0,198,255,0.4);
    background: rgba(0,0,0,0.8);
    color: white;
    margin-bottom: 15px;
}

input::placeholder {
    color: #aaa;
}

input:focus {
    outline: none;
    border-color: #00c6ff;
    box-shadow: 0 0 10px #00c6ff;
}

/* PASSWORD TOGGLE */
.password-toggle {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    margin: 0.5rem;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 20px #00c6ff;
    transform: scale(1.05);
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="login-container">

    <h1>Pathfinding System</h1>
    <div class="greeting">Authenticate to continue</div>

    <form id="loginForm">

        <div class="input-group">
            <input type="text" id="username" placeholder="Username or Email" required>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
            <span class="password-toggle" onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Login</button><br>
        <button type="button" onclick="signUp()">Sign Up</button>

    </form>

    <div class="footer">Team Path Optimizer ⚡</div>

</div>

<script>
   // SIGN UP
function signUp() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value;

    if (username === "" || password.length < 6) {
        alert("Invalid input (min password 6 chars)");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // check if user exists
    let exists = users.find(u => u.username === username);
    if (exists) {
        alert("User already exists");
        return;
    }

    // store user
    users.push({ username, password });
    localStorage.setItem("users", JSON.stringify(users));

    alert("Signup successful");
}

function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.username === username && u.password === password);

    if (user) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("username", username);

        alert("Login successful");
        window.location.href = "index.html";
    } else {
        alert("Invalid credentials");
    }
});
</script>

</body>
</html>
